on : 
  push:
      branches:
          - main
          - "release/**"
          
      paths:
          - "src/**"
  pull_request:
      branches:
          - main
          - "release/**"
      paths:
          - "src/**"
jobs:
  test:
      runs-on: ubuntu-latest
      steps:
      - name: Chekout code 
        uses: actions/checkout@v4.2.2

      - name: Run tests
        run: npm test

           